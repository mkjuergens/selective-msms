common:
  # ── Data paths (adapt to your local setup) ──
  dataset_tsv: data/MassSpecGym.tsv
  helper_dir: data/
  gt_path: data/ground_truth_bits_labels_test.pt
  base_out_dir: outputs/eval

  # ── Retrieval settings ──
  metric: cosine
  top_k_hits: [1, 5, 20]
  temperature: 1.0
  aggregations: [score, fingerprint, probability]

  # ── Scoring functions to evaluate ──
  fingerprint_measures:
    - bitwise_epistemic
    - bitwise_aleatoric
    - bitwise_total

  retrieval_measures:
    - bitwise_total
    - bitwise_epistemic
    - retrieval_epistemic
    - retrieval_aleatoric
    - retrieval_total
    - confidence
    - score_gap
    - rank_var_1
    - rank_var_5
    - rank_var_20
    - n_candidates

  # ── Distance-based measures (disabled by default) ──
  # distance_measures:
  #   - knn_distance
  #   - mahalanobis
  #   - relative_mahalanobis
  # distance_n_neighbors: 100
  # distance_metric: cosine
  # distance_normalize: true
  # distance_covariance: shrinkage
  # distance_knn_aggregation: kth
  # distance_embedding_type: fingerprint

  #  Aggregation parameters (only for topk aggregation)
  topk_k: 80
  topk_temp: 0.1

  # runtime settings
  device: cuda:0
  batch_size: 128
  num_workers: 2
  bin_width: 0.1

# ── Model groups ──
# Each group contains one or more models sharing the same UQ method.
# pred_dir must contain fp_probs.pt (generated by run_evaluation or make_predictions).
# if pred_dir is missing, provide ckpt or ckpts to load the model(s) and generate predictions on the fly.
model_groups:
  ensemble:
    out_subdir: ensemble
    models:
      # Example: Deep Ensemble with focal loss
      focal:
        pred_dir: outputs/predictions/ensemble_focal
        label: Ensemble (Focal)
        temperature: 0.01
        mode: ensemble
        # ckpts: <comma-separated paths to member checkpoints>

  mc_dropout:
    out_subdir: mc_dropout
    models:
      focal:
        pred_dir: outputs/predictions/mcdo_focal
        label: MC Dropout (Focal)
        mode: mcdo
        passes: 50
        temperature: 1.0
        # ckpt: <path to single checkpoint>

  laplace:
    out_subdir: laplace
    models:
      focal:
        pred_dir: outputs/predictions/laplace_focal
        label: Laplace (Focal)
        mode: laplace
        laplace_samples: 50
        laplace_tune_prior: true
        laplace_max_batches: 200