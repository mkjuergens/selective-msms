common:
  # ── Data paths (adapt to your local setup) ──
  dataset_tsv: data/MassSpecGym.tsv
  helper_dir: data/
  gt_path: data/ground_truth_bits_labels_test.pt
  base_out_dir: outputs/eval

  # ── Retrieval settings ──
  metric: cosine
  top_k_hits: [1, 5, 20]
  temperature: 1.0
  aggregations: [score, fingerprint, probability]

  # ── Scoring functions to evaluate ──
  fingerprint_measures:
    - bitwise_epistemic
    - bitwise_aleatoric
    - bitwise_total

  retrieval_measures:
    - bitwise_total
    - bitwise_epistemic
    - retrieval_epistemic
    - retrieval_aleatoric
    - retrieval_total
    - confidence
    - score_gap
    - rank_var_1
    - rank_var_5
    - rank_var_20
    - n_candidates

  # ── Distance-based measures (disabled by default) ──
  # distance_measures:
  #   - knn_distance
  #   - mahalanobis
  #   - relative_mahalanobis
  # distance_n_neighbors: 100
  # distance_metric: cosine
  # distance_normalize: true
  # distance_covariance: shrinkage
  # distance_knn_aggregation: kth
  # distance_embedding_type: fingerprint

  # ── Aggregation parameters ──
  topk_k: 80
  topk_temp: 0.1

  # ── Runtime ──
  device: cuda:0
  batch_size: 256
  num_workers: 2
  bin_width: 0.1

# ── Model groups ──
# Each model entry requires a pred_dir containing fp_probs.pt (and optionally
# ranker.pt for ranking-loss models). If fp_probs.pt does not exist,
# the script generates predictions from checkpoints specified below.
model_groups:
  ensemble:
    out_subdir: ensemble
    models:
      ranking:
        pred_dir: outputs/predictions/ensemble_ranking
        label: Deep Ensemble (Ranking)
        temperature: 1.0
        mode: ensemble
        # ckpts: <comma-separated member checkpoint paths>

      focal:
        pred_dir: outputs/predictions/ensemble_focal
        label: Deep Ensemble (Focal)
        temperature: 0.01
        mode: ensemble
        # ckpts: <comma-separated member checkpoint paths>

  mc_dropout:
    out_subdir: mc_dropout
    models:
      ranking:
        pred_dir: outputs/predictions/mcdo_ranking
        label: MC Dropout (Ranking)
        mode: mcdo
        passes: 50
        temperature: 1.0
        # ckpt: <path to single checkpoint>

      focal:
        pred_dir: outputs/predictions/mcdo_focal
        label: MC Dropout (Focal)
        mode: mcdo
        passes: 50
        temperature: 1.0
        # ckpt: <path to single checkpoint>

  laplace:
    out_subdir: laplace
    models:
      ranking:
        pred_dir: outputs/predictions/laplace_ranking
        label: Laplace (Ranking)
        mode: laplace
        laplace_samples: 50
        laplace_tune_prior: true
        laplace_max_batches: 200
        # ckpt: <path to single checkpoint>

      focal:
        pred_dir: outputs/predictions/laplace_focal
        label: Laplace (Focal)
        mode: laplace
        laplace_samples: 50
        laplace_tune_prior: true
        laplace_max_batches: 200
        # ckpt: <path to single checkpoint>
